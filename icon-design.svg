<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB071"/>
      <stop offset="55%" stop-color="#EF6A60"/>
      <stop offset="100%" stop-color="#C83C7A"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="12" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.18"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- iOS-style rounded square background -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>

  <!-- Heart-note mark in cream -->
  <g fill="#FFF6E8" filter="url(#softShadow)">
    <!-- Note stem -->
    <rect x="702" y="132" width="56" height="290" rx="14"/>
    <!-- Note flag (eighth-note curl) -->
    <path d="M 758 132
             C 874 164  894 280  828 368
             C 848 298  802 246  758 238
             Z"/>
    <!-- Heart (note head) -->
    <path d="M 512 808
             C 282 608  182 418  282 296
             C 362 206  472 236  512 336
             C 552 236  662 206  742 296
             C 842 418  742 608  512 808 Z"/>
  </g>
</svg>
