<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#FF9F43"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Music note -->
  <g transform="translate(256,256) scale(1.1)" fill="white">
    <!-- Note head 1 -->
    <ellipse cx="-60" cy="60" rx="38" ry="28" transform="rotate(-20,-60,60)"/>
    <!-- Note head 2 -->
    <ellipse cx="60" cy="30" rx="38" ry="28" transform="rotate(-20,60,30)"/>
    <!-- Stems -->
    <rect x="-30" y="-100" width="10" height="168" rx="5"/>
    <rect x="90" y="-130" width="10" height="168" rx="5"/>
    <!-- Beam -->
    <rect x="-30" y="-130" width="130" height="12" rx="6" transform="rotate(-8,-30,-130)"/>
    <rect x="-30" y="-105" width="130" height="12" rx="6" transform="rotate(-8,-30,-105)"/>
  </g>
  <!-- Heart accent -->
  <g transform="translate(380,100) scale(0.5)">
    <path d="M0,30 A20,20,0,0,1,40,30 A20,20,0,0,1,80,30 Q80,60,40,90 Q0,60,0,30 Z" fill="rgba(255,255,255,0.7)"/>
  </g>
</svg>
